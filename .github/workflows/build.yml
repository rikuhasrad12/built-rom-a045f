name: Build ROM A045F
on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: 'Build type'
        required: true
        default: 'userdebug'
        type: choice
        options:
          - userdebug
          - user
          - eng
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Maximize Storage
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 8192
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Check Disk Space
        run: df -h

      - name: Install Dependencies
        run: |
          sudo apt update && sudo apt install -y \
            git-core gnupg flex bison build-essential \
            zip curl zlib1g-dev libc6-dev-i386 \
            libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip python3 \
            python-is-python3 bc ccache lz4 libssl-dev

      - name: Setup Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Install Repo Tool
        run: |
          mkdir -p ~/.local/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo \
            > ~/.local/bin/repo
          chmod a+x ~/.local/bin/repo
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Init LineageOS Source
        run: |
          mkdir -p ~/android/lineage
          cd ~/android/lineage
          repo init \
            -u https://github.com/LineageOS/android.git \
            -b lineage-21.0 \
            --depth=1 \
            --no-clone-bundle \
            --no-tags

      - name: Setup Local Manifest
        run: |
          mkdir -p ~/android/lineage/.repo/local_manifests
          cat > ~/android/lineage/.repo/local_manifests/roomservice.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project name="rikuhasrad12/android_device_samsung_a045f"
                     path="device/samsung/a045f"
                     remote="github"
                     revision="main" />
          </manifest>
          EOF

      - name: Sync Source
        run: |
          cd ~/android/lineage
          repo sync -c -j$(nproc) \
            --no-tags \
            --no-clone-bundle \
            --optimized-fetch \
            --prune \
            --force-sync

      - name: Check Disk After Sync
        run: df -h

      - name: Setup Vendor
        run: |
          mkdir -p ~/android/lineage/vendor/samsung/a045f
          cat > ~/android/lineage/vendor/samsung/a045f/a045f-vendor.mk << 'EOF'
          # Vendor placeholder
          EOF

      - name: Build ROM
        run: |
          cd ~/android/lineage
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M 10G
          source build/envsetup.sh
          breakfast a045f
          mka bacon -j$(nproc) 2>&1 | tee build.log

      - name: Upload ROM Result
        uses: actions/upload-artifact@v4
        with:
          name: ROM-A045F-${{ github.run_number }}
          path: |
            ~/android/lineage/out/target/product/a045f/*.zip
            ~/android/lineage/out/target/product/a045f/boot.img
          retention-days: 7

      - name: Upload Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: ~/android/lineage/build.log
          retention-days: 3
